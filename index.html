<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語音翻譯工作站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&family=Noto+Sans+Thai:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --primary: #38bdf8;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --error: #f43f5e;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Noto Sans TC', 'Noto Sans Thai', sans-serif;
            background: var(--bg); color: var(--text-main);
            margin: 0; padding: 10px; min-height: 100vh;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 600px; padding-bottom: 140px; }

        /* 安全警告 */
        #alert-box {
            background: rgba(244, 63, 94, 0.15); border: 1px solid var(--error);
            color: #ff8095; padding: 12px; border-radius: 12px; margin-bottom: 20px;
            display: none; text-align: center; font-size: 0.9rem;
        }

        header { text-align: center; padding: 25px 0; }
        header h1 { 
            font-size: 1.8rem; margin: 0; letter-spacing: 2px; 
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 人性化語系選擇卡片 */
        .lang-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px;
        }

        .lang-card {
            background: var(--card-bg); border: 2px solid #2d3748; border-radius: 16px;
            padding: 12px 5px; text-align: center; cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lang-card.active {
            border-color: var(--primary); background: rgba(56, 189, 248, 0.1);
            transform: scale(1.05);
        }

        .lang-card .flag { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .lang-card .name { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); }
        .lang-card.active .name { color: var(--primary); }

        /* 內容顯示區 */
        .display-panel {
            background: var(--card-bg); border-radius: 24px; padding: 20px;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel-label {
            font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
        }

        .output-text {
            font-size: 1.4rem; line-height: 1.6; min-height: 70px;
            word-break: break-all; color: var(--text-main);
        }

        .translation-text { color: var(--primary); font-weight: 500; }

        /* 底部控制欄 */
        .footer-controls {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(11, 15, 26, 0.9); backdrop-filter: blur(15px);
            padding: 25px 20px; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center;
        }

        .mic-btn {
            width: 100%; max-width: 380px; height: 60px;
            border-radius: 30px; border: none; font-size: 1.2rem; font-weight: 700;
            background: var(--primary); color: #000; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
        }

        .mic-btn.recording {
            background: var(--error); color: white;
            box-shadow: 0 0 20px rgba(244, 63, 92, 0.4);
        }

        .mic-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="container">
    <div id="alert-box">請確保使用 HTTPS 網址或 localhost 開啟，否則無法啟用麥克風。</div>

    <header>
        <h1>語音翻譯工作站</h1>
    </header>

    <div class="lang-grid">
        <div class="lang-card active" onclick="changeLang('en', this)">
            <span class="flag">🇺🇸</span><span class="name">英文</span>
        </div>
        <div class="lang-card" onclick="changeLang('ja', this)">
            <span class="flag">🇯🇵</span><span class="name">日文</span>
        </div>
        <div class="lang-card" onclick="changeLang('vi', this)">
            <span class="flag">🇻🇳</span><span class="name">越南文</span>
        </div>
        <div class="lang-card" onclick="changeLang('th', this)">
            <span class="flag">🇹🇭</span><span class="name">泰文</span>
        </div>
    </div>

    <div class="display-panel">
        <div class="panel-label"><span>●</span> 偵測來源：中文 (繁體)</div>
        <div id="originalBox" class="output-text">等待語音輸入...</div>
    </div>

    <div class="display-panel">
        <div class="panel-label" id="targetLabel" style="color: var(--primary);"><span>●</span> 目標翻譯：英文 (EN)</div>
        <div id="targetBox" class="output-text translation-text">Translation will appear here...</div>
    </div>
</div>

<div class="footer-controls">
    <button id="micBtn" class="mic-btn" onclick="toggleSpeech()">
        <span id="micIcon">🎤</span> <span id="btnText">開始語音辨識</span>
    </button>
</div>

<script>
    // 安全檢查：麥克風權限環境
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        document.getElementById('alert-box').style.display = 'block';
    }

    // 語音辨識核心
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isRecording = false;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = (event) => {
            const result = event.results[event.results.length - 1][0].transcript;
            document.getElementById('originalBox').innerText = result;
            // 模擬翻譯聯動
            document.getElementById('targetBox').innerText = "[翻譯] " + result;
        };

        recognition.onerror = (e) => {
            console.error(e.error);
            if(e.error === 'not-allowed') alert("請點擊瀏覽器左上方『鎖頭』允許麥克風權限");
            resetUI();
        };

        recognition.onend = () => { if(isRecording) recognition.start(); }; // 斷線重連
    }

    function toggleSpeech() {
        if (!recognition) return alert("您的瀏覽器不支援此功能");
        
        const btn = document.getElementById('micBtn');
        const txt = document.getElementById('btnText');

        if (!isRecording) {
            recognition.start();
            isRecording = true;
            btn.classList.add('recording');
            txt.innerText = "正在聆聽中...";
            if (navigator.vibrate) navigator.vibrate(50);
        } else {
            recognition.stop();
            isRecording = false;
            resetUI();
        }
    }

    function resetUI() {
        const btn = document.getElementById('micBtn');
        btn.classList.remove('recording');
        document.getElementById('btnText').innerText = "開始語音辨識";
    }

    function changeLang(lang, el) {
        document.querySelectorAll('.lang-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        const labels = { en: '英文 (EN)', ja: '日文 (JA)', vi: '越南文 (VI)', th: '泰文 (TH)' };
        document.getElementById('targetLabel').innerText = `● 目標翻譯：${labels[lang]}`;
        if (navigator.vibrate) navigator.vibrate(20);
    }
</script>

</body>
</html>
