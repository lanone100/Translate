<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高清晰人性化翻譯系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&family=Noto+Sans+Thai:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --text: #f8fafc;
            --error: #ef4444;
        }

        body {
            font-family: 'Noto Sans TC', 'Noto Sans Thai', sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 15px; display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 650px; padding-bottom: 120px; }

        /* 警告通知 */
        #alert-box {
            background: rgba(239, 68, 68, 0.2); border: 1px solid var(--error);
            color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px;
            display: none; text-align: center; font-weight: bold;
        }

        /* 語言切換卡片 */
        .lang-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px; margin: 20px 0;
        }

        .lang-card {
            background: var(--card); border: 2px solid #334155; border-radius: 16px;
            padding: 12px; text-align: center; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center;
        }

        .lang-card.active {
            border-color: var(--primary); background: rgba(56, 189, 248, 0.1);
            transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.2);
        }

        .lang-card .flag { font-size: 24px; margin-bottom: 5px; }
        .lang-card .name { font-size: 1rem; font-weight: 700; color: #94a3b8; }
        .lang-card.active .name { color: var(--primary); }

        /* 清晰顯示區塊 */
        .display-area {
            background: var(--card); border-radius: 20px; padding: 25px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }

        .label { font-size: 0.85rem; color: #64748b; font-weight: bold; margin-bottom: 10px; display: block; }
        .text-box { font-size: 1.5rem; line-height: 1.6; min-height: 60px; color: var(--text); word-break: break-all; }
        .text-target { color: var(--primary); border-left: 4px solid var(--primary); padding-left: 15px; }

        /* 底部按鈕 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            padding: 20px; display: flex; flex-direction: column; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .mic-btn {
            width: 90%; max-width: 400px; padding: 18px; border-radius: 50px;
            border: none; background: var(--primary); color: #000;
            font-size: 1.3rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4);
        }

        .mic-btn.recording { background: var(--error); color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="alert-box">⚠️ 檢測到環境錯誤：請確保使用 HTTPS 開啟此頁面。</div>

    <header style="text-align: center;">
        <h2 style="margin: 0;">AI 超感傳譯 <span style="font-weight: 300; font-size: 0.8em; color: var(--primary);">PRO</span></h2>
    </header>

    <div class="lang-grid">
        <div class="lang-card active" onclick="setLang('en', this, 1.0)">
            <span class="flag">🇺🇸</span><span class="name">英文</span>
        </div>
        <div class="lang-card" onclick="setLang('ja', this, 1.5)">
            <span class="flag">🇯🇵</span><span class="name">日文</span>
        </div>
        <div class="lang-card" onclick="setLang('vi', this, 1.2)">
            <span class="flag">🇻🇳</span><span class="name">越南文</span>
        </div>
        <div class="lang-card" onclick="setLang('th', this, 1.3)">
            <span class="flag">🇹🇭</span><span class="name">泰文</span>
        </div>
    </div>

    <div class="display-area">
        <span class="label">🎤 正在偵測：中文 (繁體)</span>
        <div id="srcTxt" class="text-box">請點擊下方按鈕並開始說話...</div>
    </div>

    <div class="display-area">
        <span id="targetLabel" class="label">🌐 目標語言：英文 (EN)</span>
        <div id="targetTxt" class="text-box text-target">翻譯結果將清晰呈現在此。</div>
    </div>
</div>

<div class="bottom-nav">
    <button class="mic-btn" id="micBtn" onclick="handleMicClick()">按住 開始語音翻譯</button>
</div>

<script>
    // 1. 環境與權重檢查
    const alertBox = document.getElementById('alert-box');
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        alertBox.style.display = 'block';
        alertBox.innerText = "❌ 警告：麥克風僅在 HTTPS 環境下運作。";
    }

    // 2. 初始化語音辨識
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isRecording = false;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = (event) => {
            let currentResult = event.results[event.results.length - 1][0].transcript;
            document.getElementById('srcTxt').innerText = currentResult;
            // 模擬翻譯
            document.getElementById('targetTxt').innerText = " (正在翻譯中...) " + currentResult;
        };

        recognition.onerror = (event) => {
            console.error("辨識錯誤: " + event.error);
            if (event.error === 'not-allowed') {
                alert("請開啟麥克風權限！點擊網址左方的『鎖頭』圖示並允許。");
            }
            stopRecording();
        };
    } else {
        alert("您的瀏覽器不支援 Web Speech API，請改用 Chrome 或 Edge。");
    }

    // 3. UI 操作邏輯
    function handleMicClick() {
        if (!isRecording) {
            startRecording();
        } else {
            stopRecording();
        }
    }

    function startRecording() {
        try {
            recognition.start();
            isRecording = true;
            const btn = document.getElementById('micBtn');
            btn.innerText = "🛑 正在聆聽，請說話...";
            btn.classList.add('recording');
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        } catch (e) { console.error(e); }
    }

    function stopRecording() {
        recognition.stop();
        isRecording = false;
        const btn = document.getElementById('micBtn');
        btn.innerText = "按住 開始語音翻譯";
        btn.classList.remove('recording');
    }

    function setLang(lang, element, weight) {
        document.querySelectorAll('.lang-card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        const names = {en:'英文 (EN)', ja:'日文 (JA)', vi:'越南文 (VI)', th:'泰文 (TH)'};
        document.getElementById('targetLabel').innerText = `🌐 目標語言：${names[lang]}`;
    }
</script>
</body>
</html>
