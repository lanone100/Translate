<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人性化 AI 語音翻譯</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&family=Noto+Sans+Thai:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --active-bg: rgba(56, 189, 248, 0.15);
            --text: #f8fafc;
        }

        body {
            font-family: 'Noto Sans TC', 'Noto Sans Thai', sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 15px; display: flex; justify-content: center;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 600px; padding-bottom: 120px; }

        /* 人性化語言選擇器 */
        .lang-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .lang-card {
            background: var(--card);
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .lang-card .flag { font-size: 24px; }
        .lang-card .name { font-size: 0.9rem; font-weight: 700; color: #94a3b8; }
        .lang-card .native { font-size: 0.75rem; color: #64748b; }

        /* 選取狀態 */
        .lang-card.active {
            border-color: var(--primary);
            background: var(--active-bg);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(56, 189, 248, 0.3);
        }
        .lang-card.active .name { color: var(--primary); }
        .lang-card.active .native { color: var(--text); }

        /* 顯示盒 */
        .display-area {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .label-tag {
            background: #334155; color: #94a3b8;
            padding: 4px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: bold; margin-bottom: 12px; display: inline-block;
        }

        .text-main {
            font-size: 1.4rem; line-height: 1.5; color: var(--text);
            min-height: 80px; word-break: break-all;
        }

        .text-sub { color: var(--primary); font-weight: bold; }

        /* 固定底部操作按鈕 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px; display: flex; justify-content: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .mic-btn {
            width: 100%; max-width: 350px;
            background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
            color: white; border: none; padding: 18px; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; padding: 10px 0;">
        <h2 style="margin:0; letter-spacing: 1px;">AI 智能同聲傳譯</h2>
        <p style="color: #64748b; font-size: 0.9rem;">請選擇目標語系並開始說話</p>
    </header>

    <div class="lang-grid">
        <div class="lang-card active" onclick="selectLang('en', this, 1.0)">
            <span class="flag">🇺🇸</span>
            <span class="name">英文</span>
            <span class="native">English</span>
        </div>
        <div class="lang-card" onclick="selectLang('ja', this, 1.4)">
            <span class="flag">🇯🇵</span>
            <span class="name">日文</span>
            <span class="native">日本語</span>
        </div>
        <div class="lang-card" onclick="selectLang('vi', this, 1.2)">
            <span class="flag">🇻🇳</span>
            <span class="name">越南文</span>
            <span class="native">Tiếng Việt</span>
        </div>
        <div class="lang-card" onclick="selectLang('th', this, 1.3)">
            <span class="flag">🇹🇭</span>
            <span class="name">泰文</span>
            <span class="native">ไทย</span>
        </div>
    </div>

    <div class="display-area">
        <span class="label-tag">🎤 偵測中文 (繁體)</span>
        <div id="srcTxt" class="text-main">你好，請問今天有什麼可以幫你的嗎？</div>
    </div>

    <div class="display-area">
        <span class="label-tag" id="targetLabel" style="background: var(--active-bg); color: var(--primary);">🌐 譯文 (English)</span>
        <div id="targetTxt" class="text-main text-sub">Hello, how can I help you today?</div>
    </div>

    <div class="display-area" style="background: rgba(255,255,255,0.03);">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 0.9rem; color: #94a3b8;">預計字數: <input type="number" id="wordInp" value="100" style="width:60px; background:none; border:1px solid #334155; color:#fff; text-align:center;" oninput="updatePrice()"></span>
            <span style="font-size: 1.2rem; font-weight: bold;">預估金額: <span style="color:var(--primary);">$</span><span id="totalPrice" style="color:var(--primary);">50</span></span>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button class="mic-btn" id="mainBtn" onclick="toggleRecord()">
        <span>🎤</span> <span id="btnText">按住 開始翻譯</span>
    </button>
</div>

<script>
    let currentWeight = 1.0;

    function selectLang(lang, element, weight) {
        // 觸覺回饋 (手機端)
        if (window.navigator.vibrate) window.navigator.vibrate(20);

        // UI 切換
        document.querySelectorAll('.lang-card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');

        // 更新數據
        currentWeight = weight;
        const langNames = { 'en': 'English', 'ja': '日本語', 'vi': 'Tiếng Việt', 'th': 'ไทย' };
        document.getElementById('targetLabel').innerText = `🌐 譯文 (${langNames[lang]})`;
        
        updatePrice();
    }

    function updatePrice() {
        const words = document.getElementById('wordInp').value || 0;
        const price = Math.round(words * 0.5 * currentWeight);
        document.getElementById('totalPrice').innerText = price.toLocaleString();
    }

    function toggleRecord() {
        const btn = document.getElementById('mainBtn');
        const txt = document.getElementById('btnText');
        if (btn.style.background.includes("red")) {
            btn.style.background = "linear-gradient(135deg, #38bdf8 0%, #2563eb 100%)";
            txt.innerText = "按住 開始翻譯";
        } else {
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            btn.style.background = "#ef4444";
            txt.innerText = "正在聆聽...";
        }
    }
</script>

</body>
</html>
