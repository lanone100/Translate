<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 語音翻譯工作站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --accent-color: #00f2fe;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #0f172a;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 800px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { text-align: center; margin-bottom: 25px; letter-spacing: 2px; font-weight: 700; color: var(--accent-color); }

        /* 語音區域 */
        .speech-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .speech-section { grid-template-columns: 1fr; }
        }

        .display-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .label { font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; display: block; }

        /* 按鈕設計 */
        .controls { text-align: center; margin-bottom: 30px; }
        .btn-record {
            background: var(--primary-gradient);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }
        .btn-record:active { transform: scale(0.95); }

        /* 計算表格區域 */
        .calc-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }

        .calc-table th, .calc-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .calc-table th { background: rgba(255, 255, 255, 0.1); font-size: 0.9rem; }

        input[type="number"] {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            width: 80px;
        }

        .total-highlight { color: var(--accent-color); font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>TRANSLATE PRO</h2>
    
    <div class="controls">
        <button class="btn-record" id="micBtn">🎤 開始即時翻譯</button>
        <p id="status" style="margin-top:10px; font-size: 0.8rem; color: #ccc;">點擊按鈕授權麥克風</p>
    </div>

    <div class="speech-section">
        <div>
            <span class="label">原文 (辨識中)</span>
            <div id="text-src" class="display-box">等待語音輸入...</div>
        </div>
        <div>
            <span class="label">譯文 (AI 翻譯)</span>
            <div id="text-target" class="display-box" style="color: var(--accent-color);">Translation will appear here...</div>
        </div>
    </div>

    <h3>費用估算 (裝載計算)</h3>
    <table class="calc-table">
        <thead>
            <tr>
                <th>項目</th>
                <th>數量 / 字數</th>
                <th>單價 (TWD)</th>
                <th>小計</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>翻譯字數</td>
                <td><input type="number" id="wordCount" value="0" oninput="calculate()"></td>
                <td>$ <span id="unitPrice">0.5</span></td>
                <td>$ <span id="subtotalWord">0</span></td>
            </tr>
            <tr>
                <td>API 調用次數</td>
                <td><input type="number" id="apiCalls" value="0" oninput="calculate()"></td>
                <td>$ <span id="apiPrice">2.0</span></td>
                <td>$ <span id="subtotalApi">0</span></td>
            </tr>
            <tr style="background: rgba(0,242,254,0.1);">
                <td colspan="3" style="text-align: right; font-weight: bold;">總預計成本：</td>
                <td class="total-highlight">$ <span id="totalCost">0</span></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // 簡單的計算公式邏輯
    function calculate() {
        const words = parseFloat(document.getElementById('wordCount').value) || 0;
        const calls = parseFloat(document.getElementById('apiCalls').value) || 0;
        const uPrice = 0.5; // 字數單價
        const aPrice = 2.0; // API 次數單價

        const subWord = words * uPrice;
        const subApi = calls * aPrice;
        const total = subWord + subApi;

        document.getElementById('subtotalWord').innerText = subWord.toFixed(1);
        document.getElementById('subtotalApi').innerText = subApi.toFixed(1);
        document.getElementById('totalCost').innerText = total.toLocaleString();
    }

    // 模擬語音與字數聯動 (實際開發需結合 Speech API)
    const micBtn = document.getElementById('micBtn');
    let isRecording = false;

    micBtn.onclick = () => {
        isRecording = !isRecording;
        if(isRecording) {
            micBtn.innerText = "🛑 停止辨識";
            micBtn.style.background = "linear-gradient(135deg, #f87171 0%, #dc2626 100%)";
            document.getElementById('status').innerText = "系統正在聆聽並計算字數...";
        } else {
            micBtn.innerText = "🎤 開始即時翻譯";
            micBtn.style.background = "var(--primary-gradient)";
            document.getElementById('status').innerText = "已停止";
        }
    };
</script>

</body>
</html>
