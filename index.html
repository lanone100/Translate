<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高清晰多語翻譯系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+TC:wght@500;700&family=Noto+Sans+Thai:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050a15;
            --panel-bg: #111827;
            --accent-blue: #38bdf8;
            --accent-thai: #fbbf24;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            font-family: 'Inter', 'Noto Sans TC', 'Noto Sans Thai', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            margin: 0; padding: 15px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 850px; }

        /* 清晰標題 */
        .header { text-align: center; padding: 10px 0 25px; }
        .header h1 { font-size: 1.8rem; letter-spacing: -0.5px; margin: 0; color: var(--accent-blue); }

        /* 語系選擇器 - 手機端滑動優化 */
        .lang-scroll {
            display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 15px;
            scrollbar-width: none; -ms-overflow-style: none;
            justify-content: center;
        }
        .lang-scroll::-webkit-scrollbar { display: none; }

        .btn-lang {
            flex: 0 0 auto; background: var(--panel-bg); border: 2px solid #374151;
            color: var(--text-secondary); padding: 10px 20px; border-radius: 12px;
            font-weight: 700; cursor: pointer; font-size: 1rem;
        }
        .btn-lang.active { 
            border-color: var(--accent-blue); color: var(--accent-blue);
            background: rgba(56, 189, 248, 0.1);
        }

        /* 內容顯示區 - 極致清晰 */
        .display-card {
            background: var(--panel-bg); border-radius: 24px; padding: 25px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }

        .label { font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 12px; display: block; text-transform: uppercase; }

        .text-output {
            min-height: 120px; font-size: 1.4rem; line-height: 1.6;
            color: var(--text-primary); word-break: break-all;
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;
        }

        .translated { color: var(--accent-blue); border-left: 4px solid var(--accent-blue); }

        /* 計算表格 - 易讀性優化 */
        .calc-box { background: #1f2937; border-radius: 20px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.9rem; color: var(--text-secondary); padding-bottom: 15px; }
        td { padding: 12px 0; border-top: 1px solid #374151; font-size: 1.1rem; }

        input[type="number"] {
            background: #000; border: 1px solid var(--accent-blue); color: #fff;
            padding: 8px; border-radius: 8px; width: 80px; font-size: 1.1rem; font-weight: bold;
        }

        .price-tag { font-size: 1.5rem; font-weight: 800; color: var(--accent-blue); }

        /* 底部按鈕 */
        .mic-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 400px; padding: 18px; border-radius: 40px;
            border: none; background: var(--accent-blue); color: #000;
            font-size: 1.2rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TRANSLATE <span style="font-weight: 300;">PRO</span></h1>
        <div class="lang-scroll">
            <button class="btn-lang active" onclick="setLang('en', this)">EN 英文</button>
            <button class="btn-lang" onclick="setLang('ja', this)">JA 日本語</button>
            <button class="btn-lang" onclick="setLang('vi', this)">VI 越南文</button>
            <button class="btn-lang" onclick="setLang('th', this)">TH 泰文</button>
        </div>
    </div>

    <div class="display-card">
        <span class="label">中文原文 (Source)</span>
        <div id="srcTxt" class="text-output">請開始說話，系統將自動辨識...</div>
    </div>

    <div class="display-card">
        <span id="targetLabel" class="label">目標翻譯 (Target: EN)</span>
        <div id="targetTxt" class="text-output translated">Translation result will appear here with high contrast.</div>
    </div>

    <div class="calc-box">
        <span class="label">裝載量計費估算</span>
        <table>
            <thead>
                <tr>
                    <th>項目</th>
                    <th>數量</th>
                    <th>小計</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>翻譯總字數</td>
                    <td><input type="number" id="wordCount" value="0" oninput="calc()"></td>
                    <td>$ <span id="txtSum">0</span></td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: right; padding-top: 20px;">預估總金額：</td>
                    <td class="price-tag" style="padding-top: 20px;">$ <span id="totalSum">0</span></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div style="height: 100px;"></div> <button class="mic-btn" onclick="toggleMic()">🎤 按住 開始即時辨識</button>
</div>

<script>
    let currentWeight = 1.0;

    function setLang(lang, btn) {
        // 切換按鈕狀態
        document.querySelectorAll('.btn-lang').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 設定各語系顯示與權重
        const configs = {
            'en': { label: 'EN 英文', weight: 1.0, color: '#38bdf8' },
            'ja': { label: 'JA 日本語', weight: 1.5, color: '#38bdf8' },
            'vi': { label: 'VI 越南文', weight: 1.2, color: '#38bdf8' },
            'th': { label: 'TH 泰文', weight: 1.3, color: '#fbbf24' }
        };

        const cfg = configs[lang];
        currentWeight = cfg.weight;
        document.getElementById('targetLabel').innerText = `目標翻譯 (Target: ${cfg.label})`;
        document.getElementById('targetLabel').style.color = cfg.color;
        document.getElementById('targetTxt').style.borderColor = cfg.color;
        document.getElementById('targetTxt').style.color = cfg.color;
        calc();
    }

    function calc() {
        const words = document.getElementById('wordCount').value || 0;
        const subtotal = words * 0.5 * currentWeight;
        document.getElementById('txtSum').innerText = Math.round(subtotal);
        document.getElementById('totalSum').innerText = Math.round(subtotal).toLocaleString();
    }

    function toggleMic() {
        // 模擬觸覺反饋
        if (window.navigator.vibrate) window.navigator.vibrate(50);
        const btn = document.querySelector('.mic-btn');
        if(btn.innerText.includes("開始")) {
            btn.innerText = "🛑 停止辨識中...";
            btn.style.background = "#ef4444";
        } else {
            btn.innerText = "🎤 按住 開始即時辨識";
            btn.style.background = "#38bdf8";
        }
    }
</script>

</body>
</html>
