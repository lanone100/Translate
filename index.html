<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echo 2.0 — 未來感語音翻譯</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --accent-primary: #8b5cf6;
            --accent-secondary: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg-main);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ─── Header ─── */
        header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #a78bfa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        /* ─── Main Container ─── */
        .container {
            flex: 1;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ─── Language Switcher ─── */
        .lang-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            backdrop-filter: blur(12px);
        }

        .lang-select-group {
            text-align: center;
            flex: 1;
        }

        .lang-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        select {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            text-align-last: center;
            outline: none;
        }

        .swap-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* ─── Translation Display ─── */
        .display-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bubble {
            padding: 20px;
            border-radius: var(--radius-lg);
            position: relative;
            line-height: 1.6;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .bubble-src {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: var(--text-muted);
        }

        .bubble-target {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(6, 182, 212, 0.2));
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-top-right-radius: 4px;
            min-height: 120px;
            font-weight: 500;
        }

        /* ─── Mic Control ─── */
        .control-section {
            margin-top: auto;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .mic-wrapper {
            position: relative;
            width: 80px; height: 80px;
        }

        .mic-btn {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--accent-primary);
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            z-index: 2;
            position: relative;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
            transition: transform 0.2s, background 0.3s;
        }

        .mic-btn.active {
            background: #ef4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.6);
            transform: scale(0.9);
        }

        .pulse-ring {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent-primary);
            border-radius: 50%;
            z-index: 1;
            opacity: 0;
        }

        .active + .pulse-ring {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* ─── Visualizer ─── */
        .visualizer {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 20px;
        }
        .bar {
            width: 3px; height: 100%;
            background: var(--accent-secondary);
            border-radius: 2px;
            animation: quiet 0.5s infinite;
        }
        @keyframes quiet {
            0%, 100% { height: 4px; }
            50% { height: 15px; }
        }

        /* ─── Tabs/Nav ─── */
        .bottom-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
        }

        .nav-item {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active { color: var(--accent-secondary); }

        /* PC 調整 */
        @media (min-width: 768px) {
            .container { padding-top: 40px; }
            .bubble { font-size: 22px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ECHO</div>
        <div class="visualizer" id="viz">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
        </div>
    </header>

    <div class="container">
        <div class="lang-card">
            <div class="lang-select-group">
                <div class="lang-label">說話語言</div>
                <select id="srcLang">
                    <option value="zh-TW">中文 (繁體)</option>
                    <option value="en-US">English</option>
                    <option value="ja-JP">日本語</option>
                </select>
            </div>
            <button class="swap-btn">⇄</button>
            <div class="lang-select-group">
                <div class="lang-label">目標語言</div>
                <select id="tgtLang">
                    <option value="en-US">English</option>
                    <option value="zh-TW">中文 (繁體)</option>
                    <option value="ja-JP">日本語</option>
                </select>
            </div>
        </div>

        <div class="display-area">
            <div class="bubble bubble-src" id="srcText">
                點擊下方麥克風，開始說話...
            </div>
            <div class="bubble bubble-target" id="tgtText">
                Translation will appear here...
            </div>
        </div>

        <div class="control-section">
            <div class="mic-wrapper">
                <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙</button>
                <div class="pulse-ring"></div>
            </div>
            <p id="statusHint" style="color: var(--text-muted); font-size: 14px;">等待指令</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <span>🏠</span>
            <span>翻譯</span>
        </a>
        <a href="#" class="nav-item">
            <span>🕒</span>
            <span>紀錄</span>
        </a>
        <a href="#" class="nav-item">
            <span>⚙️</span>
            <span>設定</span>
        </a>
    </nav>

    <script>
        let isRecording = false;
        const micBtn = document.getElementById('micBtn');
        const statusHint = document.getElementById('statusHint');
        const viz = document.getElementById('viz');

        function toggleMic() {
            isRecording = !isRecording;
            if (isRecording) {
                micBtn.classList.add('active');
                micBtn.innerHTML = '⏹';
                statusHint.textContent = '正在聆聽...';
                statusHint.style.color = '#ef4444';
                viz.style.opacity = '1';
            } else {
                micBtn.classList.remove('active');
                micBtn.innerHTML = '🎙';
                statusHint.textContent = '點擊開始錄音';
                statusHint.style.color = '#94a3b8';
                viz.style.opacity = '0.3';
            }
        }

        // 初始化視覺動畫隱藏
        viz.style.opacity = '0.3';
    </script>
</body>
</html>
